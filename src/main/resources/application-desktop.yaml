# 데스크톱 배포 프로파일. jpackage/런처가 -Dspring.profiles.active=desktop 으로 활성화.
spring:
  main:
    headless: false                 # AWT 시스템 트레이/브라우저 자동 열기 위해 필요

# 무콘솔(javaw / .app) 실행은 화면에 로그가 안 보이므로 파일로 남긴다(문제 진단용).
logging:
  file:
    name: ${user.home}/InstagramAnalyzer/app.log

instagram:
  data:
    # 앱 번들은 읽기 전용이므로 export 데이터는 사용자 홈의 쓰기 가능한 위치에 둔다.
    # 사용자는 웹 UI 에서 ZIP 업로드 → 여기로 추출·임포트된다.
    root: ${user.home}/InstagramAnalyzer/data
